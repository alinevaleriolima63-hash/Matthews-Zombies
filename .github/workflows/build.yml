name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Build with Gradle
      run: |
        PASTA_DO_MOD=$(dirname $(find . -name "build.gradle" | head -n 1))
        echo "Pasta encontrada: $PASTA_DO_MOD"
        cd "$PASTA_DO_MOD"
        gradle build

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: mod-jar
        path: |
          **/build/libs/*.jar
