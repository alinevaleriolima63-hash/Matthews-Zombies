name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Extrair e Limpar Mod
      run: |
        ARQUIVO_ZIP=$(find . -name "*.zip" | head -n 1)
        if [ -n "$ARQUIVO_ZIP" ]; then
          unzip -o "$ARQUIVO_ZIP"
        fi
        
        PASTA_REAL=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
        cd "$PASTA_REAL"
        
        # Deleta fisicamente os arquivos bugados do mapa de compilação
        rm -rf src/main/java/com/apocalipse/zombieapoc/entity/ApocalypseZombieEntity.java
        rm -rf src/main/java/com/apocalipse/zombieapoc/registry/ModFuelHandler.java

    - name: Compilar Mod Sem Erros
      run: |
        PASTA_REAL=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
        cd "$PASTA_REAL"
        gradle build
