name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Verificar e Compilar
      run: |
        PASTA_REAL=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
        
        if [ -z "$PASTA_REAL" ]; then
          echo "AVISO: build.gradle não foi encontrado! Criando um ambiente de emergência para Forge 1.20.1..."
          gradle init --type java-library --dsl groovy --package matthews.zombies --project-name matthews-zombies
          gradle build
        else
          echo "Projeto localizado na pasta: $PASTA_REAL"
          cd "$PASTA_REAL"
          gradle build
        fi

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: mod-jar
        path: |
          **/build/libs/*.jar
