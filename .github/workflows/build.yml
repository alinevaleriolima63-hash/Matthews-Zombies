name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Build with Gradle
      run: |
        if [ -d "zombieapoc" ]; then
          cd zombieapoc
        elif [ -d "ZombieApoc" ]; then
          cd ZombieApoc
        elif [ -d "zombieapoc-completo" ]; then
          cd zombieapoc-completo
        fi
        gradle build

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: mod-jar
        path: |
          zombieapoc/build/libs/*.jar
          ZombieApoc/build/libs/*.jar
          zombieapoc-completo/build/libs/*.jar
          build/libs/*.jar
