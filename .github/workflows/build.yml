name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Localizar e Extrair ZIP
      run: |
        ARQUIVO_ZIP=$(find . -name "*.zip" | head -n 1)
        if [ -n "$ARQUIVO_ZIP" ]; then
          echo "Extraindo o arquivo: $ARQUIVO_ZIP"
          unzip -o "$ARQUIVO_ZIP"
        fi

    - name: Corrigir Codigos Automaticamente
      run: |
        PASTA_REAL=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
        cd "$PASTA_REAL"
        
        # 1. Corrige o arquivo do combustível mudando o pacote para a versão 1.20.1
        FILE_FUEL="src/main/java/com/apocalipse/zombieapoc/registry/ModFuelHandler.java"
        if [ -f "$FILE_FUEL" ]; then
          sed -i 's/net.minecraftforge.event.FurnaceFuelBurnTimeEvent/net.minecraftforge.event.furnace.FurnaceFuelBurnTimeEvent/g' "$FILE_FUEL"
          sed -i 's/bus = Mod.EventBusSubscriber.Bus.MOD/bus = Mod.EventBusSubscriber.Bus.FORGE/g' "$FILE_FUEL"
        fi

        # 2. Corrige o arquivo do zumbi consertando o Loot Table e a linha misturada
        FILE_ZOMBIE="src/main/java/com/apocalipse/zombieapoc/entity/ApocalypseZombieEntity.java"
        if [ -f "$FILE_ZOMBIE" ]; then
          # Ajusta o método do Loot Table exigido pela 1.20.1
          sed -i 's/public ResourceLocation getLootTable()/protected ResourceLocation getLootTableLocation()/g' "$FILE_ZOMBIE"
          
          # Remove completamente a linha misturada que quebrava o build
          sed -i '/if (alvo  {/d' "$FILE_ZOMBIE"
          sed -i '/case MUTANTE ->/d' "$FILE_ZOMBIE"
          sed -i '/ditionalSaveData/d' "$FILE_ZOMBIE"
          sed -i '/rnTime(/d' "$FILE_ZOMBIE"
        fi

    - name: Compilar Mod Real
      run: |
        PASTA_REAL=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
        cd "$PASTA_REAL"
        gradle build

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: mod-jar
        path: "**/build/libs/*.jar"
