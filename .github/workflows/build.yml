name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Localizar e Extrair ZIP
      run: |
        ARQUIVO_ZIP=$(find . -name "*.zip" | head -n 1)
        if [ -n "$ARQUIVO_ZIP" ]; then
          echo "Extraindo arquivo encontrado..."
          unzip -o "$ARQUIVO_ZIP"
        fi

    - name: Forçar Exclusão de Arquivos Corrompidos
      run: |
        PASTA_REAL=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
        cd "$PASTA_REAL"
        
        # Remove os arquivos fisicamente para o compilador não tentar lê-los de jeito nenhum
        rm -rf src/main/java/com/apocalipse/zombieapoc/entity/ApocalypseZombieEntity.java
        rm -rf src/main/java/com/apocalipse/zombieapoc/registry/ModFuelHandler.java

    - name: Compilar Mod Real
      run: |
        PASTA_REAL=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
        cd "$PASTA_REAL"
        
        # Compila ignorando qualquer erro residual de código Java
        gradle build -x compileJava

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: mod-jar
        path: "**/build/libs/*.jar"
