name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Localizar e Extrair ZIP
      run: |
        ARQUIVO_ZIP=$(find . -name "*.zip" | head -n 1)
        if [ -n "$ARQUIVO_ZIP" ]; then
          echo "Extraindo o arquivo: $ARQUIVO_ZIP"
          unzip -o "$ARQUIVO_ZIP"
        fi

    - name: Corrigir Codigos Automaticamente
      run: |
        PASTA_REAL=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
        cd "$PASTA_REAL"
        
        # Deleta as versões corrompidas antigas para evitar que o lixo se misture
        rm -f src/main/java/com/apocalipse/zombieapoc/registry/ModFuelHandler.java
        rm -f src/main/java/com/apocalipse/zombieapoc/entity/ApocalypseZombieEntity.java
        
        # 1. Cria a versão limpa do ModFuelHandler
        mkdir -p src/main/java/com/apocalipse/zombieapoc/registry
        cat << 'EOF' > src/main/java/com/apocalipse/zombieapoc/registry/ModFuelHandler.java
        package com.apocalipse.zombieapoc.registry;
        import com.apocalipse.zombieapoc.ZombieApocMod;
        import net.minecraft.world.item.ItemStack;
        import net.minecraftforge.event.furnace.FurnaceFuelBurnTimeEvent;
        import net.minecraftforge.eventbus.api.SubscribeEvent;
        import net.minecraftforge.fml.common.Mod;
        @Mod.EventBusSubscriber(modid = ZombieApocMod.MOD_ID, bus = Mod.EventBusSubscriber.Bus.FORGE)
        public class ModFuelHandler {
            private static final int QUEIMA = 4000;
            @SubscribeEvent
            public static void onFurnaceFuelBurnTime(FurnaceFuelBurnTimeEvent event) {
                ItemStack item = event.getItemStack();
                if (item != null && item.is(ModItems.COMBUSTIVEL.get())) {
                    event.setBurnTime(QUEIMA);
                }
            }
        }
        EOF

        # 2. Cria a versão limpa do ApocalypseZombieEntity
        mkdir -p src/main/java/com/apocalipse/zombieapoc/entity
        cat << 'EOF' > src/main/java/com/apocalipse/zombieapoc/entity/ApocalypseZombieEntity.java
        package com.apocalipse.zombieapoc.entity;
        import net.minecraft.nbt.CompoundTag;
        import net.minecraft.network.syncher.EntityDataAccessor;
        import net.minecraft.network.syncher.EntityDataSerializers;
        import net.minecraft.network.syncher.SynchedEntityData;
        import net.minecraft.resources.ResourceLocation;
        import net.minecraft.util.RandomSource;
        import net.minecraft.world.DifficultyInstance;
        import net.minecraft.world.entity.EntityDimensions;
        import net.minecraft.world.entity.EntityType;
        import net.minecraft.world.entity.LivingEntity;
        import net.minecraft.world.entity.MobSpawnType;
        import net.minecraft.world.entity.Pose;
        import net.minecraft.world.entity.SpawnGroupData;
        import net.minecraft.world.entity.ai.attributes.AttributeSupplier;
        import net.minecraft.world.entity.monster.Zombie;
        import net.minecraft.world.level.ServerLevelAccessor;
        import javax.annotation.Nullable;
        public class ApocalypseZombieEntity extends Zombie {
            private static final EntityDataAccessor<Integer> DATA_VARIANT = SynchedEntityData.defineId(ApocalypseZombieEntity.class, EntityDataSerializers.INT);
            private static final java.util.UUID VELO_ID = java.util.UUID.fromString("8c56f3a1-9999-4a2e-9e2b-000000000099");
            private boolean bonusNoturnoAtivo = false;
            public ApocalypseZombieEntity(EntityType<? extends Zombie> type, net.minecraft.world.level.Level level) { super(type, level); }
            @Override
            protected void registerGoals() { super.registerGoals(); this.goalSelector.addGoal(2, new NecromanteAbilityGoal(this)); }
            @Override
            public void aiStep() { super.aiStep(); if (!this.level().isClientSide && this.tickCount % 20 == 0) atualizarBonusVelocidadeNoturna(); }
            private void atualizarBonusVelocidadeNoturna() {
                boolean noite = ApocalypseTimeUtil.ehNoite(this.level());
                if (noite == bonusNoturnoAtivo) return;
                bonusNoturnoAtivo = noite;
                var velo = this.getAttribute(net.minecraft.world.entity.ai.attributes.Attributes.MOVEMENT_SPEED);
                if (velo == null) return;
                velo.removeModifier(VELO_ID);
                if (noite) velo.addTransientModifier(new net.minecraft.world.entity.ai.attributes.AttributeModifier(VELO_ID, "Bonus noturno", 0.35D, net.minecraft.world.entity.ai.attributes.AttributeModifier.Operation.MULTIPLY_TOTAL));
            }
            public static AttributeSupplier.Builder createAttributes() { return Zombie.createAttributes(); }
            @Override
            protected void defineSynchedData() { super.defineSynchedData(); this.entityData.define(DATA_VARIANT, ZombieVariant.NORMAL.ordinal()); }
            public ZombieVariant getVariant() { return ZombieVariant.byId(this.entityData.get(DATA_VARIANT)); }
            public void setVariant(ZombieVariant variant) {
                this.entityData.set(DATA_VARIANT, variant.ordinal());
                this.getAttribute(net.minecraft.world.entity.ai.attributes.Attributes.MAX_HEALTH).setBaseValue(variant.getMaxHealth());
                this.getAttribute(net.minecraft.world.entity.ai.attributes.Attributes.MOVEMENT_SPEED).setBaseValue(variant.getMovementSpeed());
                this.getAttribute(net.minecraft.world.entity.ai.attributes.Attributes.ATTACK_DAMAGE).setBaseValue(variant.getAttackDamage());
                if (this.tickCount == 0) this.setHealth(this.getMaxHealth());
            }
            @Nullable
            @Override
            public SpawnGroupData finalizeSpawn(ServerLevelAccessor lvl, DifficultyInstance diff, MobSpawnType st, @Nullable SpawnGroupData sgd, @Nullable CompoundTag tag) {
                SpawnGroupData data = super.finalizeSpawn(lvl, diff, st, sgd, tag);
                if (tag == null || !tag.contains("ZombieApocVariant")) setVariant(pickRandomVariant(this.random));
                return data;
            }
            private static ZombieVariant pickRandomVariant(RandomSource random) {
                ZombieVariant[] variantes = ZombieVariant.values();
                int pesoTotal = 0;
                for (ZombieVariant v : variantes) pesoTotal += v.getSpawnWeight();
                int alvo = random.nextInt(pesoTotal);
                for (ZombieVariant v : variantes) { alvo -= v.getSpawnWeight(); if (alvo  { if (target instanceof LivingEntity liv) liv.setSecondsOnFire(6); }
                    case MUTANTE -> { if (target instanceof LivingEntity liv) { double dx = target.getX() - this.getX(); double dz = target.getZ() - this.getZ(); liv.knockback(1.2D, -dx, -dz); } }
                    default -> {}
                }
                return true;
            }
            @Override
            public boolean fireImmune() { return getVariant() == ZombieVariant.QUEIMADO || super.fireImmune(); }
            @Override
            public EntityDimensions getDimensions(Pose pose) { return super.getDimensions(pose).scale(getVariant().getScale()); }
            @Override
            protected ResourceLocation getLootTableLocation() { return getVariant().getLootTable(); }
            @Override
            public void addAdditionalSaveData(CompoundTag tag) { super.addAdditionalSaveData(tag); tag.putInt("ZombieApocVariant", getVariant().ordinal()); }
            @Override
            public void readAdditionalSaveData(CompoundTag tag) { super.readAdditionalSaveData(tag); if (tag.contains("ZombieApocVariant")) setVariant(ZombieVariant.byId(tag.getInt("ZombieApocVariant"))); }
        }
        EOF

    - name: Compilar Mod Real
      run: |
        PASTA_REAL=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
        cd "$PASTA_REAL"
        gradle build

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: mod-jar
        path: "**/build/libs/*.jar"
