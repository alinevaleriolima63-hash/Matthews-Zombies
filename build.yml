name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Extrair ZIP e Compilar
      run: |
        if [ -f "zombieapoc-completo.zip" ]; then
          echo "Extraindo o mod do arquivo ZIP..."
          unzip zombieapoc-completo.zip
        fi
        
        PASTA_REAL=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
        echo "Projeto localizado na pasta: $PASTA_REAL"
        cd "$PASTA_REAL"
        gradle build

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: mod-jar
        path: |
          **/build/libs/*.jar
