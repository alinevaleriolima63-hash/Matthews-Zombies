name: Build Matthews Zombies

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Extract ZIP
      run: unzip -q zombieapoc-completo.zip
    - name: Build with Gradle
      run: cd zombieapoc && chmod +x gradlew && ./gradlew build
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: matthews-zombies-mod
        path: zombieapoc/build/libs/*.jar