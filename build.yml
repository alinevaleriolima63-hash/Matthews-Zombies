name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Localizar e Extrair ZIP
      run: |
        ARQUIVO_ZIP=$(find . -name "*.zip" | head -n 1)
        if [ -n "$ARQUIVO_ZIP" ]; then
          echo "Extraindo o arquivo: $ARQUIVO_ZIP"
          unzip -o "$ARQUIVO_ZIP"
        else
          echo "Nenhum arquivo .zip encontrado!"
        fi

    - name: Compilar Mod Real
      run: |
        PASTA_REAL=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
        echo "Projeto localizado na pasta: $PASTA_REAL"
        cd "$PASTA_REAL"
        gradle build

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: mod-jar
        path: "**/build/libs/*.jar"
